<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Referência Bibliográfica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Referência Bibliográfica</h1>

        <label for="autor">Nome completo do autor</label>

        <input 
        type="text" 
        id="autor"
        placeholder="Ex.: Maurício Samy Silva">

        <button onclick="gerarReferencia()">
            Gerar Referência
        </button>

        <h2>Resultado</h2>

        <p id="resultado"></p>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
