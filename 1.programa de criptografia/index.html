<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa de Criptografia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Programa de Criptografia</h1>

        <label for="mensagem">Digite a mensagem</label>

        <input 
        type="text" id="mensagem"
        placeholder="digite uma frase">

        <button onclick="criptografar()">
            Criptografar
        </button>

        <h2>Mensagem Criptografada</h2>

        <p id="resultado"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
